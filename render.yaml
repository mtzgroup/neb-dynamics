services:
  - type: web
    name: mtzdrive
    runtime: python
    plan: free
    region: ohio
    buildCommand: pip install uv && uv sync --frozen && git clone --depth 1 https://github.com/mtzgroup/retropaths.git /opt/render/project/retropaths && uv pip install -e /opt/render/project/retropaths
    startCommand: bash ./scripts/start_render_drive.sh
    healthCheckPath: /api/state
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: MEPD_DRIVE_HOST
        value: 0.0.0.0
      - key: RETROPATHS_REPO
        value: /opt/render/project/retropaths
      - key: MEPD_DRIVE_WORKDIR
        value: /tmp/mepd-drive
      - key: MEPD_DRIVE_WORKSPACE
        value: examples/claisen
      - key: MEPD_DRIVE_INPUTS
        value: examples/example_inputs.toml
      - key: MEPD_DRIVE_SMILES
        value: C=C.CCC=N
      - key: MEPD_DRIVE_ENVIRONMENT
        value: O
      - key: MEPD_DRIVE_NAME
        value: render-drive
      - key: CHEMCLOUD_CREDENTIALS_B64
        sync: false
      - key: CHEMCLOUD_CREDENTIALS_TOML
        sync: false
